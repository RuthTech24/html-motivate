<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | InspireLife</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- Header Section -->
  <header class="header">
      <div class="logo">
          <h1>InspireLife</h1>
      </div>

      <nav class="navbar">
          <ul class="nav-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">About</a></li>
              <li><a href="blog.html">Blog</a></li>
              <li><a href="categories.html">Categories</a></li>
              <li><a href="contact.html" class="active">Contact</a></li>
              <li><a href="subscribe.html" class="btn-subscribe">Subscribe</a></li>
          </ul>
      </nav>
  </header>

  <!-- Contact Hero Section -->
  <section class="contact-hero">
      <div class="contact-hero-content">
          <h1>Contact Us</h1>
          <p>
              We would love to hear from you! Whether you have a question, suggestion, or want to collaborate, reach out and let us know.
          </p>
      </div>
  </section>

  <!-- Contact Form Section -->
  <section class="contact-section">
      <div class="container">
          <form action="#" method="POST" class="contact-form">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your Name" required>

              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="Your Email" required>

              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>

              <button type="submit" class="submit-btn">Send Message</button>
          </form>
      </div>
  </section>

  <!-- Footer Section -->
  <footer>
      <p>&copy; 2026 InspireLife. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
